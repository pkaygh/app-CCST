<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Guidian Hotel | Solwezi</title>
    <style>
        :root {
            --navy: #0a192f;
            --gold: #c5a059;
            --white: #ffffff;
            --gray: #f4f4f4;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--white); color: var(--navy); }
       
        /* Header & Hero */
        header { background: var(--navy); color: var(--gold); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .hero { background: linear-gradient(rgba(10,25,47,0.7), rgba(10,25,47,0.7)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=800&q=80');
                height: 300px; background-size: cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center; flex-direction: column; }
       
        /* Room Section */
        .section { padding: 20px; max-width: 800px; margin: auto; }
        .room-card { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; overflow: hidden; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .room-info { padding: 15px; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        /* Booking Form */
        #booking-form { background: var(--navy); color: white; padding: 25px; border-radius: 8px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: var(--gold); color: var(--navy); font-weight: bold; cursor: pointer; font-size: 1rem; }
       
        /* WhatsApp Button */
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
       
        .success-msg { display: none; color: #25d366; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>THE GUIDIAN</h1>
    <p>Executive Hotel - Agona Swedru</p>
</header>

<div class="hero">
    <h2>Luxury Awaits</h2>
    <p>Secure your stay in the heart of Agona Swedru</p>
</div>

<div class="section">
    <h3>Our Executive Rooms</h3>
    <div class="room-card">
        <div class="room-info">
            <h4>Executive King Suite</h4>
            <p>Air-con, High-speed WiFi, En-suite Bathroom.</p>
            <p class="price">Gh1,500 / Night</p>
        </div>
    </div>

    <div id="booking-form">
        <h3>Instant Booking Inquiry</h3>
        <form id="submit-to-google">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <select name="roomType">
                <option value="Executive King">Executive King Suite</option>
                <option value="Standard Twin">Standard Twin Room</option>
            </select>
            <label>Check-In Date</label>
            <input type="date" name="checkIn" required>
            <label>Check-Out Date</label>
            <input type="date" name="checkOut" required>
            <button type="submit" id="submit-btn">Check Availability</button>
        </form>
        <p class="success-msg" id="msg">Inquiry Sent! We will contact you shortly.</p>
    </div>
</div>

<a href="https://wa.me/0555793978" class="whatsapp-btn">Chat on WhatsApp</a>

<script>
    // REPLACE THIS WITH YOUR APPS SCRIPT URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyzWetqT0VH9klw3SuAMlYQaFnYE3stpwTatnuWf6aNtGw7h7ePSNroeM4ufLHUTCyX/exec';
    const form = document.getElementById('submit-to-google');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', e => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerHTML = "Sending...";

      // Prepare data for the Google Sheet
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      fetch(scriptURL, {
          method: 'POST',
          body: JSON.stringify(data)
      })
      .then(response => {
          msg.style.display = "block";
          form.reset();
          btn.innerHTML = "Check Availability";
          btn.disabled = false;
      })
      .catch(error => {
          console.error('Error!', error.message);
          alert("Something went wrong. Please try again.");
          btn.disabled = false;
      });
    });
</script>

</body>
</html>
